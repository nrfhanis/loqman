<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Lock</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffb6c1,#ff69b4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* LOGIN BOX */
.container{
    text-align:center;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    width:300px;
}

/* DOT DISPLAY */
.dots{
    font-size:30px;
    letter-spacing:10px;
    margin-bottom:20px;
    min-height:40px;
}

/* KEYPAD */
.keypad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

button{
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#ff69b4;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#ff85c1;
}

/* ENTER + CLEAR */
.action{
    grid-column:span 3;
    display:flex;
    gap:10px;
}

.action button{
    flex:1;
    background:#ff4fa3;
}

/* PAGE 2 */
.page2{
    display:none;
    text-align:center;
    color:white;
}

.page2 h1{
    font-size:28px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="container" id="loginBox">
    <h2>Enter Password</h2>
    <div class="dots" id="dots"></div>

    <div class="keypad">
        <button onclick="press(1)">1</button>
        <button onclick="press(2)">2</button>
        <button onclick="press(3)">3</button>
        <button onclick="press(4)">4</button>
        <button onclick="press(5)">5</button>
        <button onclick="press(6)">6</button>
        <button onclick="press(7)">7</button>
        <button onclick="press(8)">8</button>
        <button onclick="press(9)">9</button>
        <button onclick="clearAll()">C</button>
        <button onclick="press(0)">0</button>
        <button onclick="backspace()">⌫</button>

        <div class="action">
            <button onclick="check()">ENTER</button>
        </div>
    </div>
</div>

<!-- PAGE 2 -->
<div class="page2" id="page2">
    <h1>💖 Welcome Luke 💖</h1>
    <p>Okay ready for the next page !</p>
</div>

<script>
let input = "";
const password = "23326";

function press(num){
    if(input.length < 10){
        input += num;
        updateDots();
    }
}

function updateDots(){
    document.getElementById("dots").innerText = "•".repeat(input.length);
}

function clearAll(){
    input = "";
    updateDots();
}

function backspace(){
    input = input.slice(0,-1);
    updateDots();
}

function check(){
    if(input === password){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("page2").style.display = "block";
    } else {
        alert("SALAH LUKE !!!");
        clearAll();
    }
}
</script>

</body>
</html>
